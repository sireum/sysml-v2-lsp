name: Build and Release

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[release]'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: ./build.sh

      - name: Test
        run: ./test/test-lsp.sh

      - name: Compute version
        id: version
        run: |
          get_prop() { grep "^$1=" versions.properties | cut -d= -f2; }
          PILOT_VERSION=$(grep '<revision>' build/SysML-v2-Pilot-Implementation/pom.xml | head -1 | sed 's/.*<revision>\(.*\)<\/revision>.*/\1/' | sed 's/-SNAPSHOT//')
          SPEC_VERSION=$(get_prop org.omg.sysml.version)
          SHORT_HASH=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)
          echo "tag=${PILOT_VERSION}-${SPEC_VERSION}-${DATE}.${SHORT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: |
            sysml-lsp-server.jar
            sysml.library.zip
          make_latest: true
